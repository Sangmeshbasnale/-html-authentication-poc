<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — AuthSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Dark Mode Toggle -->
  <button class="auth-theme-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  <main class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo" aria-hidden="true">
        <i class="bi bi-envelope-open-fill"></i>
      </div>
      <h1 class="auth-title">Forgot password?</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <!-- ── Success state (hidden by default) ── -->
      <div id="successState" class="d-none text-center py-2">
        <div style="font-size:3.25rem; color:var(--success); margin-bottom:.75rem;">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <p class="fw-600 mb-1" style="color:var(--text); font-size:1rem; font-weight:600;">
          Check your inbox
        </p>
        <p style="font-size:.875rem; color:var(--text-muted); margin-bottom:1.5rem;">
          We've sent a password reset link to your email address. It may take a minute to arrive.
        </p>
        <a href="reset-password.html" class="btn-primary-custom" style="width:auto; padding:.65rem 1.75rem;">
          <i class="bi bi-arrow-right me-1"></i> Continue to Reset
        </a>
      </div>

      <!-- ── Form ── -->
      <form id="forgotForm" novalidate>

        <div class="mb-4">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>

        <button type="submit" class="btn-primary-custom" id="submitBtn">
          <span id="submitText">Send Reset Link</span>
          <span id="submitSpinner" class="spinner-border d-none" role="status" aria-hidden="true"></span>
        </button>

      </form>

      <div class="text-center mt-3">
        <a href="index.html" style="font-size:.875rem; font-weight:500;">
          <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* ── Dark mode ── */
    const html      = document.documentElement;
    const themeBtn  = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const applyTheme = (t) => {
      html.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      themeIcon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    };
    applyTheme(localStorage.getItem('theme') || 'light');
    themeBtn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    /* ── Form submit ── */
    document.getElementById('forgotForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const emailEl = document.getElementById('email');
      emailEl.classList.remove('is-invalid', 'is-valid');

      if (!emailEl.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        emailEl.classList.add('is-invalid');
        return;
      }
      emailEl.classList.add('is-valid');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('submitText').textContent = 'Sending…';
      document.getElementById('submitSpinner').classList.remove('d-none');

      setTimeout(() => {
        document.getElementById('forgotForm').classList.add('d-none');
        document.getElementById('successState').classList.remove('d-none');
      }, 1500);
    });
  </script>
</body>
</html>
