<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — AuthSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Dark Mode Toggle -->
  <button class="auth-theme-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  <main class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo" aria-hidden="true">
        <i class="bi bi-key-fill"></i>
      </div>
      <h1 class="auth-title">Reset password</h1>
      <p class="auth-subtitle">Choose a strong new password for your account</p>

      <form id="resetForm" novalidate>

        <!-- New Password -->
        <div class="mb-3">
          <label for="newPassword" class="form-label">New Password</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="newPassword"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
            />
            <button
              class="btn btn-outline-secondary"
              type="button"
              id="toggleNew"
              aria-label="Show or hide new password"
              tabindex="-1"
            >
              <i class="bi bi-eye" id="eyeNew"></i>
            </button>
          </div>

          <!-- Strength bar -->
          <div class="strength-bar" id="strengthBar" aria-hidden="true">
            <div class="strength-segment" id="seg1"></div>
            <div class="strength-segment" id="seg2"></div>
            <div class="strength-segment" id="seg3"></div>
            <div class="strength-segment" id="seg4"></div>
          </div>
          <div class="strength-label" id="strengthLabel" style="color:var(--text-muted);">
            Enter a password
          </div>
          <div class="invalid-feedback" id="newPwError">Password must be at least 8 characters.</div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm New Password</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              placeholder="Repeat your new password"
              autocomplete="new-password"
              required
            />
            <button
              class="btn btn-outline-secondary"
              type="button"
              id="toggleConfirm"
              aria-label="Show or hide confirm password"
              tabindex="-1"
            >
              <i class="bi bi-eye" id="eyeConfirm"></i>
            </button>
          </div>
          <div class="invalid-feedback" id="cpwError">Passwords do not match.</div>
        </div>

        <!-- Requirements checklist -->
        <ul class="req-list mb-4" aria-label="Password requirements">
          <li id="req-len">   <i class="bi bi-x-circle"></i> 8+ characters</li>
          <li id="req-upper"> <i class="bi bi-x-circle"></i> Uppercase letter</li>
          <li id="req-num">   <i class="bi bi-x-circle"></i> Number</li>
          <li id="req-spec">  <i class="bi bi-x-circle"></i> Special character</li>
        </ul>

        <button type="submit" class="btn-primary-custom" id="resetBtn">
          <span id="resetText">Update Password</span>
          <span id="resetSpinner" class="spinner-border d-none" role="status" aria-hidden="true"></span>
        </button>

      </form>

      <div class="text-center mt-3">
        <a href="index.html" style="font-size:.875rem; font-weight:500;">
          <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* ── Dark mode ── */
    const html      = document.documentElement;
    const themeBtn  = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const applyTheme = (t) => {
      html.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      themeIcon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    };
    applyTheme(localStorage.getItem('theme') || 'light');
    themeBtn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    /* ── Show / hide helpers ── */
    function makeToggle(btnId, inputId, iconId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const inp  = document.getElementById(inputId);
        const ic   = document.getElementById(iconId);
        const show = inp.type === 'password';
        inp.type     = show ? 'text'            : 'password';
        ic.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
      });
    }
    makeToggle('toggleNew',     'newPassword',     'eyeNew');
    makeToggle('toggleConfirm', 'confirmPassword', 'eyeConfirm');

    /* ── Password strength + requirements ── */
    const pwInput  = document.getElementById('newPassword');
    const segments = ['seg1','seg2','seg3','seg4'].map(id => document.getElementById(id));
    const strLabel = document.getElementById('strengthLabel');
    const levels   = [
      { cls: 'weak',   color: '#ef4444', text: 'Weak — too short' },
      { cls: 'fair',   color: '#f59e0b', text: 'Fair' },
      { cls: 'good',   color: '#06b6d4', text: 'Good' },
      { cls: 'strong', color: '#10b981', text: 'Strong' },
    ];

    function setReq(id, met) {
      const el   = document.getElementById(id);
      const text = el.textContent.trim().replace(/^\S+\s/, '');
      el.className = met ? 'met' : '';
      el.innerHTML = met
        ? `<i class="bi bi-check-circle-fill"></i> ${text}`
        : `<i class="bi bi-x-circle"></i> ${text}`;
    }

    pwInput.addEventListener('input', () => {
      const v = pwInput.value;
      const checks = [
        v.length >= 8,
        /[A-Z]/.test(v),
        /[0-9]/.test(v),
        /[^A-Za-z0-9]/.test(v),
      ];
      const score = checks.filter(Boolean).length;

      segments.forEach((seg, i) => {
        seg.className = 'strength-segment';
        if (i < score) seg.classList.add(levels[score - 1].cls);
      });

      if (!v) {
        strLabel.textContent = 'Enter a password';
        strLabel.style.color = 'var(--text-muted)';
      } else {
        strLabel.textContent = levels[score - 1]?.text || 'Weak';
        strLabel.style.color = levels[score - 1]?.color || '#ef4444';
      }

      setReq('req-len',   checks[0]);
      setReq('req-upper', checks[1]);
      setReq('req-num',   checks[2]);
      setReq('req-spec',  checks[3]);
    });

    /* ── Form validation + submit ── */
    document.getElementById('resetForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const pwEl  = document.getElementById('newPassword');
      const cpwEl = document.getElementById('confirmPassword');
      let valid = true;

      pwEl.classList.remove('is-invalid', 'is-valid');
      cpwEl.classList.remove('is-invalid', 'is-valid');

      if (!pwEl.value || pwEl.value.length < 8) {
        pwEl.classList.add('is-invalid');
        document.getElementById('newPwError').textContent = 'Password must be at least 8 characters.';
        valid = false;
      } else pwEl.classList.add('is-valid');

      if (!cpwEl.value || cpwEl.value !== pwEl.value) {
        cpwEl.classList.add('is-invalid');
        document.getElementById('cpwError').textContent = !cpwEl.value
          ? 'Please confirm your password.'
          : 'Passwords do not match.';
        valid = false;
      } else cpwEl.classList.add('is-valid');

      if (!valid) return;

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      document.getElementById('resetText').textContent = 'Updating…';
      document.getElementById('resetSpinner').classList.remove('d-none');
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    });
  </script>
</body>
</html>
