<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AuthSystem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Dark Mode Toggle -->
  <button class="auth-theme-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
  </button>

  <main class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-logo" aria-hidden="true">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <!-- Login Form -->
      <form id="loginForm" novalidate autocomplete="on">

        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>

        <div class="mb-2">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button
              class="btn btn-outline-secondary"
              type="button"
              id="togglePassword"
              aria-label="Show or hide password"
              tabindex="-1"
            >
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
          <div class="invalid-feedback" id="passError"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
          <div class="form-check mb-0">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label" for="remember" style="font-size:.85rem; color:var(--text-muted);">
              Remember me
            </label>
          </div>
          <a href="forgot-password.html" style="font-size:.85rem; font-weight:500;">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="btn-primary-custom" id="loginBtn">
          <span id="loginText">Sign In</span>
          <span id="loginSpinner" class="spinner-border d-none" role="status" aria-hidden="true"></span>
        </button>

      </form>

      <div class="auth-divider">or</div>

      <p class="text-center mb-0" style="font-size:.9rem; color:var(--text-muted);">
        Don't have an account?
        <a href="register.html" style="font-weight:600;">Create one</a>
      </p>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* ── Dark mode ── */
    const html      = document.documentElement;
    const themeBtn  = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    const applyTheme = (t) => {
      html.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      themeIcon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    };
    applyTheme(localStorage.getItem('theme') || 'light');
    themeBtn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    /* ── Show / hide password ── */
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pw  = document.getElementById('password');
      const eye = document.getElementById('eyeIcon');
      const show = pw.type === 'password';
      pw.type        = show ? 'text'       : 'password';
      eye.className  = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    /* ── Form validation + submit ── */
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const emailEl = document.getElementById('email');
      const passEl  = document.getElementById('password');
      const passErr = document.getElementById('passError');
      let valid = true;

      emailEl.classList.remove('is-invalid', 'is-valid');
      passEl.classList.remove('is-invalid', 'is-valid');

      if (!emailEl.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
        emailEl.classList.add('is-invalid');
        valid = false;
      } else {
        emailEl.classList.add('is-valid');
      }

      if (!passEl.value || passEl.value.length < 6) {
        passEl.classList.add('is-invalid');
        passErr.textContent = passEl.value
          ? 'Password must be at least 6 characters.'
          : 'Password is required.';
        valid = false;
      } else {
        passEl.classList.add('is-valid');
      }

      if (!valid) return;

      /* Loading state */
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      document.getElementById('loginText').textContent = 'Signing in…';
      document.getElementById('loginSpinner').classList.remove('d-none');

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    });
  </script>
</body>
</html>
